name: Generate

on:
  push:

jobs:
  graphql-schema:
    name: GraphQL Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2.3.4

      - uses: actions/setup-node@v2.1.5
        with:
          node-version: 15.x

      - name: Generate App
        run: npm ci

      - name: Commit Schema
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: Generate GraphQL schema
          file_pattern: schema.graphql
